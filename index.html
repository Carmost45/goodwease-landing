  .testi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
  .testi-card {
    background: var(--surface); border: 1px solid var(--border-light);
    border-radius: var(--radius-lg); padding: 1.75rem;
  }
  .testi-quote { font-size: 0.9rem; color: var(--text-2); line-height: 1.7; margin-bottom: 1.25rem; font-style: italic; }
  .testi-quote::before { content: '\201C'; font-family: 'Sora', sans-serif; font-size: 2rem; color: var(--sky); display: block; line-height: 1; margin-bottom: 0.25rem; font-style: normal; }
  .testi-author { font-weight: 600; font-size: 0.85rem; color: var(--navy); }
  .testi-company { font-size: 0.78rem; color: var(--text-3); margin-top: 0.2rem; }

  /* ===== FAQ ===== */
  .faq-section { background: var(--surface); }
  .faq-list { max-width: 760px; display: flex; flex-direction: column; gap: 0.75rem; }
  .faq-item {
    background: var(--white); border: 1px solid var(--border-light);
    border-radius: var(--radius-lg); overflow: hidden;
  }
  .faq-q {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem 1.4rem; cursor: pointer;
    background: none; border: none; text-align: left;
    font-family: 'DM Sans', sans-serif; font-size: 0.93rem; font-weight: 600; color: var(--navy);
  }
  .faq-arrow { color: var(--sky); font-size: 1.2rem; transition: transform 0.2s; flex-shrink: 0; margin-left: 1rem; }
  .faq-item.open .faq-arrow { transform: rotate(180deg); }
  .faq-a { display: none; padding: 0 1.4rem 1.1rem; color: var(--text-2); font-size: 0.875rem; line-height: 1.7; border-top: 1px solid var(--border-light); padding-top: 0.75rem; }
  .faq-item.open .faq-a { display: block; }

  /* ===== CTA FINAL ===== */
  .cta-section {
    background: linear-gradient(135deg, #0f1c2e 0%, #1E3A5F 100%);
    text-align: center; padding: 6rem 2.5rem;
  }
  .cta-section .section-headline { color: #fff; margin: 0 auto 1rem; }
  .cta-section .section-sub { color: rgba(255,255,255,0.6); margin: 0 auto 2.5rem; }
  .cta-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem; }
  .cta-mention { color: rgba(255,255,255,0.35); font-size: 0.78rem; }

  /* ===== FOOTER ===== */
  footer {
    background: #0f1c2e; padding: 4rem 2.5rem 2rem;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .footer-inner { max-width: 1180px; margin: 0 auto; }
  .footer-top { display: grid; grid-template-columns: 1.5fr repeat(4, 1fr); gap: 3rem; margin-bottom: 3rem; }
  .footer-brand .logo { margin-bottom: 0.75rem; }
  .footer-tagline { color: rgba(255,255,255,0.45); font-size: 0.85rem; line-height: 1.6; max-width: 200px; }
  .footer-col-title { color: rgba(255,255,255,0.6); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }
  .footer-links { display: flex; flex-direction: column; gap: 0.5rem; }
  .footer-link { color: rgba(255,255,255,0.4); font-size: 0.85rem; cursor: pointer; transition: color 0.15s; }
  .footer-link:hover { color: rgba(255,255,255,0.8); }
  .footer-bottom { border-top: 1px solid rgba(255,255,255,0.06); padding-top: 1.5rem; color: rgba(255,255,255,0.25); font-size: 0.78rem; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 900px) {
    .hero-inner { grid-template-columns: 1fr; }
    .hero-visual { justify-content: flex-start; }
    .hero-visual img { max-width: 320px !important; }
    .problem-grid { grid-template-columns: 1fr; }
    .principles-grid { grid-template-columns: repeat(2, 1fr); }
    .testi-grid { grid-template-columns: 1fr; }
    .why-grid { grid-template-columns: 1fr; }
    .footer-top { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 600px) {
    .principles-grid { grid-template-columns: 1fr; }
    .nav-links { display: none; }
    .footer-top { grid-template-columns: 1fr; }
  }
</style>
</head>
