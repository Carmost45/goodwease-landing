  .principle-title { font-family: 'Sora', sans-serif; font-size: 0.95rem; font-weight: 700; color: var(--navy); margin-bottom: 0.4rem; }
  .principle-text { font-size: 0.875rem; color: var(--text-2); line-height: 1.6; }

  /* ===== CYCLE ===== */
  .cycle { background: var(--navy); position: relative; overflow: hidden; }
  .cycle::before {
    content: ''; position: absolute; right: -10%; top: -10%;
    width: 500px; height: 500px; border-radius: 50%;

  .cycle .eyebrow { color: rgba(255,255,255,0.5); }

  .steps { display: flex; flex-direction: column; gap: 0; position: relative; z-index: 1; }
  .step { display: flex; gap: 2rem; align-items: flex-start; padding: 1.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .step:last-child { border-bottom: none; }
  .step-num { font-family: 'Sora', sans-serif; font-size: 2rem; font-weight: 700; color: rgba(255,255,255,0.12); min-width: 48px; line-height: 1; padding-top: 0.1rem; }
  .step-body { flex: 1; }
  .step-title { font-family: 'Sora', sans-serif; font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 0.35rem; }
  .step-text { color: rgba(255,255,255,0.6); font-size: 0.9rem; line-height: 1.6; }
  .step-tag { font-size: 0.72rem; font-weight: 600; color: var(--sky); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.3rem; }

  /* ===== POURQUOI ===== */
  .why { background: var(--surface); }
  .why-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.25rem; }
  .why-card {
    background: var(--white); border: 1px solid var(--border-light);
    border-radius: var(--radius-lg); padding: 1.75rem;
    transition: border-color 0.2s;
  }
  .why-card:hover { border-color: var(--sky); }
  .why-icon { font-size: 1.5rem; margin-bottom: 1rem; }
  .why-title { font-family: 'Sora', sans-serif; font-size: 1rem; font-weight: 700; color: var(--navy); margin-bottom: 0.5rem; }
  .why-text { font-size: 0.875rem; color: var(--text-2); line-height: 1.65; }

  /* ===== TÉMOIGNAGES ===== */
  .testimonials { background: var(--white); }
  .testi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
  .testi-card {
    background: var(--surface); border: 1px solid var(--border-light);
    border-radius: var(--radius-lg); padding: 1.75rem;
  }
  .testi-quote { font-size: 0.9rem; color: var(--text-2); line-height: 1.7; margin-bottom: 1.25rem; font-style: italic; }
  .testi-quote::before { content: '\201C'; font-family: 'Sora', sans-serif; font-size: 2rem; color: var(--sky); display: block; line-height: 1; margin-bottom: 0.25rem; font-style: normal; }
  .testi-author { font-weight: 600; font-size: 0.85rem; color: var(--navy); }
  .testi-company { font-size: 0.78rem; color: var(--text-3); margin-top: 0.2rem; }

  /* ===== FAQ ===== */
  .faq-section { background: var(--surface); }
  .faq-list { max-width: 760px; display: flex; flex-direction: column; gap: 0.75rem; }
  .faq-item {
    background: var(--white); border: 1px solid var(--border-light);
    border-radius: var(--radius-lg); overflow: hidden;
  }
  .faq-q {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem 1.4rem; cursor: pointer;
    background: none; border: none; text-align: left;
    font-family: 'DM Sans', sans-serif; font-size: 0.93rem; font-weight: 600; color: var(--navy);
  }
  .faq-arrow { color: var(--sky); font-size: 1.2rem; transition: transform 0.2s; flex-shrink: 0; margin-left: 1rem; }
  .faq-item.open .faq-arrow { transform: rotate(180deg); }
  .faq-a { display: none; padding: 0 1.4rem 1.1rem; color: var(--text-2); font-size: 0.875rem; line-height: 1.7; border-top: 1px solid var(--border-light); padding-top: 0.75rem; }
  .faq-item.open .faq-a { display: block; }

  /* ===== CTA FINAL ===== */
  .cta-section {
    background: linear-gradient(135deg, #0f1c2e 0%, #1E3A5F 100%);
    text-align: center; padding: 6rem 2.5rem;
  }
  .cta-section .section-headline { color: #fff; margin: 0 auto 1rem; }
  .cta-section .section-sub { color: rgba(255,255,255,0.6); margin: 0 auto 2.5rem; }
  .cta-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem; }
  .cta-mention { color: rgba(255,255,255,0.35); font-size: 0.78rem; }

  /* ===== FOOTER ===== */
  footer {
    background: #0f1c2e; padding: 4rem 2.5rem 2rem;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .footer-inner { max-width: 1180px; margin: 0 auto; }
  .footer-top { display: grid; grid-template-columns: 1.5fr repeat(4, 1fr); gap: 3rem; margin-bottom: 3rem; }
  .footer-brand .logo { margin-bottom: 0.75rem; }
  .footer-tagline { color: rgba(255,255,255,0.45); font-size: 0.85rem; line-height: 1.6; max-width: 200px; }
  .footer-col-title { display: block; color: rgba(255,255,255,0.85); font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; text-decoration: none; transition: color 0.15s; cursor: pointer; }
  .footer-col-title:hover { color: var(--sky); }
  .footer-links { display: flex; flex-direction: column; gap: 0.5rem; }
  .footer-link { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
  .footer-bottom { border-top: 1px solid rgba(255,255,255,0.06); padding-top: 1.5rem; color: rgba(255,255,255,0.25); font-size: 0.78rem; }


  /* ===== MODAL CONNEXION ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(10,20,40,0.6); backdrop-filter: blur(4px);
    align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--white); border-radius: var(--radius-xl);
    padding: 2.5rem; width: 100%; max-width: 420px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.2);

  }
  @keyframes modal-in { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
  .modal-close {
    position: absolute; top: 1rem; right: 1rem;
    background: none; border: none; cursor: pointer;
    color: var(--text-3); font-size: 1.4rem; line-height: 1;

  .modal-close:hover { background: var(--surface); }
  .modal-logo { display: flex; align-items: center; gap: 0; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 1.2rem; margin-bottom: 1.5rem; }
  .modal-title { font-family: 'Sora', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--navy); margin-bottom: 0.4rem; }
  .modal-subtitle { color: var(--text-2); font-size: 0.875rem; margin-bottom: 1.5rem; line-height: 1.6; }
  .modal-input {
    width: 100%; padding: 0.75rem 1rem; border-radius: var(--radius);
    border: 1.5px solid var(--border); font-size: 0.9rem;
    font-family: 'DM Sans', sans-serif; color: var(--text-1);
    outline: none; transition: border-color 0.15s;
    margin-bottom: 0.75rem;
  }
  .modal-input:focus { border-color: var(--sky); }
  .modal-submit {
    width: 100%; padding: 0.75rem; border-radius: var(--radius);
    background: var(--sky); color: #fff; border: none; cursor: pointer;
    font-size: 0.9rem; font-weight: 600; font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
  }
  .modal-submit:hover { background: #3a7bbf; }
  .modal-submit:disabled { background: var(--border); cursor: not-allowed; }
  .modal-success {
    display: none; background: var(--green-bg); border: 1px solid #b8d98a;
    border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem;
    color: #3a5c0f; font-size: 0.875rem; line-height: 1.6;
  }
  .modal-success.show { display: block; }
  .modal-success strong { display: block; margin-bottom: 0.25rem; }
  .modal-error {
    display: none; background: #fef2f2; border: 1px solid #fca5a5;
    border-radius: var(--radius); padding: 0.75rem 1rem; margin-bottom: 0.75rem;
    color: var(--red); font-size: 0.85rem;
  }
  .modal-error.show { display: block; }
  .modal-footer { margin-top: 1.25rem; text-align: center; color: var(--text-3); font-size: 0.8rem; }
  .modal-footer a { color: var(--sky); cursor: pointer; text-decoration: underline; }

  /* ===== SECTION PÉRIMÈTRE ===== */
  .scope { background: var(--navy); padding: 5rem 2.5rem; }
  .scope .eyebrow { color: rgba(255,255,255,0.5); }
  .scope .section-headline { color: #fff; max-width: 700px; }
  .scope .section-sub { color: rgba(255,255,255,0.6); margin-bottom: 2.5rem; }
  .scope-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.25rem; margin-bottom: 2rem; }
  .scope-card {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius-lg); padding: 1.75rem;
    transition: background 0.2s, border-color 0.2s;
  }
  .scope-card:hover { background: rgba(255,255,255,0.09); border-color: rgba(74,144,217,0.5); }
  .scope-card-icon { font-size: 1.8rem; margin-bottom: 0.75rem; }
  .scope-card-title { font-family: 'Sora', sans-serif; font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
  .scope-card-text { font-size: 0.875rem; color: rgba(255,255,255,0.6); line-height: 1.65; }
  .scope-mention {
    display: flex; align-items: flex-start; gap: 0.75rem;
    background: rgba(74,144,217,0.15); border: 1px solid rgba(74,144,217,0.3);
    border-radius: var(--radius-lg); padding: 1rem 1.25rem;
  }
  .scope-mention-icon { font-size: 1rem; flex-shrink: 0; color: var(--sky); }
  .scope-mention-text { font-size: 0.85rem; color: rgba(255,255,255,0.7); line-height: 1.6; }
  .scope-mention-text strong { color: #fff; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 900px) {
    .hero-inner { grid-template-columns: 1fr; }
    .hero-visual { justify-content: flex-start; }
    .hero-visual img { max-width: 320px !important; }
    .scope-grid { grid-template-columns: 1fr; }
    .problem-grid { grid-template-columns: 1fr; }
    .principles-grid { grid-template-columns: repeat(2, 1fr); }
    .testi-grid { grid-template-columns: 1fr; }
    .why-grid { grid-template-columns: 1fr; }
    .footer-top { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 600px) {
    .principles-grid { grid-template-columns: 1fr; }
    .nav-links { display: none; }
    .footer-top { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<script>
/* ===== RENDER ENGINE ===== */
document.addEventListener('DOMContentLoaded', () => {
  const C = CONFIG;

  /* NAV */
  document.getElementById('nav').innerHTML = `
    <div class="nav-inner">
      <div class="logo"><span class="logo-good">${C.nav.logo_good}</span><span class="logo-wease">${C.nav.logo_wease}</span></div>
      <nav class="nav-links">${C.nav.links.map(l=>`<a class="nav-link" href="${l.href}">${l.label}</a>`).join('')}</nav>

        <button class="btn-ghost open-login-modal">Connexion</button>

      </div>

  /* HERO */
  const h = C.hero;
  document.getElementById('hero').innerHTML = `
    <div class="hero-inner">

        </div>

        <div class="hero-tag">${h.tag}</div>

        <p class="hero-sub">${h.subtext}</p>
        <div class="hero-actions">
          <a href="rdv.html" class="hero-btn-primary" style="text-decoration:none">${h.cta_primary}</a>
          ${h.cta_secondary ? `<button class="hero-btn-secondary">${h.cta_secondary}</button>` : ""}
        </div>
        <div class="hero-badge">${h.badge}</div>
      </div>
    </div>`;

  /* TICKER */
  const items = [...C.ticker,...C.ticker];
  document.getElementById('ticker').innerHTML = `<div class="ticker-track">${items.map(i=>`<span class="ticker-item">${i}</span>`).join('')}</div>`;

  /* SCOPE */
  const sc = C.scope;
  document.getElementById('scope').innerHTML = `
    <div class="section-inner">
      <div class="eyebrow">${sc.eyebrow}</div>
      <h2 class="section-headline">${sc.headline}</h2>
      <p class="section-sub">${sc.subtext}</p>
      <div class="scope-grid">
        ${sc.cards.map(c => `
        <div class="scope-card">
          <div class="scope-card-icon">${c.icon}</div>
          <div class="scope-card-title">${c.title}</div>
          <div class="scope-card-text">${c.text}</div>
        </div>`).join('')}
      </div>
      <div class="scope-mention">
        <span class="scope-mention-icon">💡</span>
        <span class="scope-mention-text"><strong>${sc.mention.split('.')[0]}.</strong> ${sc.mention.split('.').slice(1).join('.').trim()}</span>
      </div>
    </div>`;

  /* PROBLEM */
  const p = C.problem;
  document.getElementById('problem').innerHTML = `
    <div class="section-inner">
      <div class="problem-grid">
        <div>
          <div class="eyebrow">${p.eyebrow}</div>
          <h2 class="section-headline">${p.headline}</h2>
          <p class="section-sub">${p.subtext}</p>
        </div>
        <div class="problem-items">
          ${p.items.map(i=>`<div class="problem-item"><span class="problem-icon">${i.icon}</span><span class="problem-text">${i.text}</span></div>`).join('')}
        </div>
      </div>
    </div>`;

  /* PRINCIPLES */
  const pr = C.principles;
  document.getElementById('principles').innerHTML = `
    <div class="section-inner">
      <div class="eyebrow">${pr.eyebrow}</div>
      <h2 class="section-headline">${pr.headline}</h2>
      <div class="principles-grid">
        ${pr.items.map(i=>`
        <div class="principle-card">
          <div class="principle-icon">${i.icon}</div>
          <div class="principle-title">${i.title}</div>
          <div class="principle-text">${i.text}</div>
        </div>`).join('')}
      </div>
    </div>`;

  /* CYCLE */
  const cy = C.cycle;
  document.getElementById('cycle').innerHTML = `
    <div class="section-inner">
      <div class="eyebrow">${cy.eyebrow}</div>
      <h2 class="section-headline">${cy.headline}</h2>
      <p style="color:rgba(255,255,255,0.55);font-size:0.95rem;max-width:600px;line-height:1.7;margin-bottom:2.5rem">${cy.subtext}</p>
      <div class="steps">
        ${cy.steps.map((s,i)=>`
        <div class="step">
          <div class="step-num">${s.num}</div>
          <div class="step-body">
            <div class="step-tag">Étape ${i+1}${i===4?' — 🔄 retour à l\'étape 1':''}</div>
            <div class="step-title">${s.title}</div>
            <div class="step-text">${s.text}</div>
          </div>
        </div>`).join('')}
      </div>
      <div style="margin-top:2rem;padding:1.25rem 1.5rem;background:rgba(74,144,217,0.12);border:1px solid rgba(74,144,217,0.25);border-radius:12px;display:flex;align-items:center;gap:1rem">
        <span style="font-size:1.8rem">🔄</span>
        <div>
          <div style="color:#fff;font-weight:600;font-size:0.9rem;font-family:'Sora',sans-serif;margin-bottom:0.2rem">Le cercle vertueux se referme à chaque campagne</div>
          <div style="color:rgba(255,255,255,0.5);font-size:0.82rem">Mesurer → Agir → Remesurer → Progresser — indéfiniment. La relation s'améliore de façon continue et traçable.</div>
        </div>
      </div>
    </div>`;

  /* WHY */
  const w = C.why;
  document.getElementById('why').innerHTML = `
    <div class="section-inner">
      <div class="eyebrow">${w.eyebrow}</div>
      <h2 class="section-headline">${w.headline}</h2>
      <div class="why-grid">
        ${w.items.map(i=>`
        <div class="why-card">
          <div class="why-icon">${i.icon}</div>
          <div class="why-title">${i.title}</div>
          <div class="why-text">${i.text}</div>
        </div>`).join('')}
      </div>
    </div>`;

  /* TESTIMONIALS */
  const t = C.testimonials;
  document.getElementById('testimonials').innerHTML = `
    <div class="section-inner">
      <div class="eyebrow">${t.eyebrow}</div>
      <h2 class="section-headline">${t.headline}</h2>
      <div class="testi-grid">
        ${t.items.map(i=>`
        <div class="testi-card">
          <div class="testi-quote">${i.quote}</div>
          <div class="testi-author">${i.author}</div>
          <div class="testi-company">${i.company}</div>
        </div>`).join('')}
      </div>
    </div>`;

  /* FAQ */
  const f = C.faq;
  document.getElementById('faq').innerHTML = `
    <div class="section-inner">
      <div class="eyebrow">${f.eyebrow}</div>
      <h2 class="section-headline">${f.headline}</h2>
      <div class="faq-list">
        ${f.items.map(i=>`
        <div class="faq-item">
          <button class="faq-q">${i.q}<span class="faq-arrow">▾</span></button>
          <div class="faq-a">${i.a}</div>
        </div>`).join('')}
      </div>
    </div>`;

  /* CTA */
  const cs = C.cta_section;
  document.getElementById('cta-section').innerHTML = `
    <div class="section-inner" style="text-align:center">
      <h2 class="section-headline" style="max-width:100%;margin:0 auto 1rem;color:#fff">${cs.headline}</h2>
      <p class="section-sub" style="margin:0 auto 2.5rem;color:rgba(255,255,255,.6)">${cs.subtext}</p>
      <div class="cta-actions">
        <a href="rdv.html" class="hero-btn-primary" style="text-decoration:none">${cs.cta_primary}</a>
        ${cs.cta_secondary_tarifs ? `<a href="tarifs.html" class="hero-btn-secondary" style="text-decoration:none">${cs.cta_secondary_tarifs}</a>` : ""}
      </div>
      <div class="cta-mention">${cs.mention}</div>
    </div>`;

  /* FOOTER */
  const fo = C.footer;
  const cols = fo.cols.map(c=>`
    <div>
      <a class="footer-col-title" href="${c.href}">${c.title}</a>
      <div class="footer-links">${c.links.map(l => typeof l === 'string' ? `<span class="footer-link">${l}</span>` : `<a class="footer-link" href="${l.href}">${l.label}</a>`).join('')}</div>
    </div>`).join('');
  document.getElementById('footer').innerHTML = `
    <div class="footer-inner">
      <div class="footer-top">
        <div class="footer-brand">
          <div class="logo"><span class="logo-good">${fo.logo_good||'good'}</span><span class="logo-wease">${fo.logo_wease||'wease'}</span></div>
          <div class="footer-tagline">${fo.tagline}</div>
        </div>
        ${cols}
      </div>
      <div class="footer-bottom">${fo.legal}</div>
    </div>`;

  /* MODAL CONNEXION */
  const M = C.login_modal;
  const modal = document.getElementById('login-modal');
  const modalEmail = document.getElementById('modal-email');
  const modalSubmit = document.getElementById('modal-submit');
  const modalSuccess = document.getElementById('modal-success');
  const modalError = document.getElementById('modal-error');

  // Render modal content
  document.getElementById('modal-logo').innerHTML = `<span class="logo-good">${C.nav.logo_good}</span><span class="logo-wease">${C.nav.logo_wease}</span>`;
  document.getElementById('modal-title').textContent = M.title;
  document.getElementById('modal-subtitle').textContent = M.subtitle;
  modalEmail.placeholder = M.placeholder;
  modalSubmit.textContent = M.cta;
  document.getElementById('modal-footer').innerHTML = `${M.footer}<a id="modal-demo-link" href="rdv.html">${M.footer_link}</a>`;

  // Open modal
  function openLoginModal() {
    modal.classList.add('open');
    setTimeout(() => modalEmail.focus(), 100);
  }

  // Close modal
  function closeLoginModal() {
    modal.classList.remove('open');
    modalEmail.value = '';
    modalSuccess.classList.remove('show');
    modalError.classList.remove('show');
    modalSubmit.disabled = false;
    modalSubmit.textContent = M.cta;
  }

  document.getElementById('modal-close-btn').addEventListener('click', closeLoginModal);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeLoginModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLoginModal(); });

  // Submit magic link
  modalSubmit.addEventListener('click', async () => {
    const email = modalEmail.value.trim();
    if (!email || !email.includes('@')) {
      modalError.textContent = 'Veuillez saisir une adresse email valide.';
      modalError.classList.add('show');
      return;
    }
    modalError.classList.remove('show');
    modalSubmit.disabled = true;
    modalSubmit.textContent = 'Envoi en cours...';
    try {
      const res = await fetch(`${C.app_url}/api/auth/magic-link`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      if (res.ok) {
        modalSuccess.innerHTML = `<strong>${M.success_title}</strong>${M.success_text}`;
        modalSuccess.classList.add('show');
        modalSubmit.style.display = 'none';
        modalEmail.style.display = 'none';
      } else {
        throw new Error('Server error');
      }
    } catch {
      modalError.textContent = M.error_text;
      modalError.classList.add('show');
      modalSubmit.disabled = false;
      modalSubmit.textContent = M.cta;
    }
  });

  // Enter key on input
  modalEmail.addEventListener('keydown', (e) => { if (e.key === 'Enter') modalSubmit.click(); });

  // Wire up all "Connexion" buttons to open modal
  document.querySelectorAll('.open-login-modal').forEach(el => {
    el.addEventListener('click', openLoginModal);
  });

  /* FAQ ACCORDION */
  document.querySelectorAll('.faq-q').forEach(btn => {
    btn.addEventListener('click', () => {
      const item = btn.closest('.faq-item');
      const isOpen = item.classList.contains('open');
      document.querySelectorAll('.faq-item').forEach(el => el.classList.remove('open'));
      if (!isOpen) item.classList.add('open');
    });
  });
});
</script>
