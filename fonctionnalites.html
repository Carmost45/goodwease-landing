<!DOCTYPE html>

<head>

<title>Fonctionnalités — Goodwease</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script>

  app_url: "https://goodwease-dev.vercel.app",
  nav: { logo_good:"good", logo_wease:"wease", links:[
      { label: "Fonctionnalités", href: "fonctionnalites.html" },

    { problem_icon:"📉", problem_title:"Vous n'avez aucune donnée sur l'évolution de la relation", problem_text:"Une impression générale, quelques emails, des réunions — mais aucune mesure objective dans le temps.", solution_icon:"📊", solution_title:"Scores et radar chart par campagne", solution_text:"Chaque dimension est notée et comparée dans le temps. La progression du cercle vertueux est visible et mesurable." },

  footer: {
    tagline: "La qualité relationnelle B2B mesurée, partagée, améliorée.",
    cols: [

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1E3A5F;--sky:#4A90D9;--sky-10:#eaf3fb;--surface:#F7F8FC;--white:#FFFFFF;--border:#CBD5E1;--border-light:#E2E8F0;--text-1:#0F1C2E;--text-2:#4A5568;--text-3:#8896A5;--amber:#BA7517;--amber-bg:#FDF3DC;--green:#639922;--green-bg:#EDF5DC;--radius:8px;--radius-lg:14px;font-size:16px}
body{font-family:'DM Sans',sans-serif;color:var(--text-1);background:var(--white);line-height:1.65;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Sora',sans-serif;line-height:1.2}
a{color:inherit;text-decoration:none}
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border-light);padding:0 2.5rem}
.nav-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:2rem;height:62px}
.logo{display:flex;align-items:center;font-family:'Sora',sans-serif;font-weight:700;font-size:1.35rem;margin-right:1rem}
.logo-good{color:var(--navy)}.logo-wease{color:var(--sky)}
.nav-links{display:flex;gap:0.25rem;flex:1}
.nav-link{padding:0.4rem 0.85rem;border-radius:6px;font-size:0.88rem;font-weight:500;color:var(--text-2);cursor:pointer;transition:background 0.15s}
.nav-link:hover,.nav-link.active{background:var(--sky-10);color:var(--navy)}
.nav-actions{display:flex;align-items:center;gap:0.75rem}
.btn-ghost{padding:0.4rem 1rem;border-radius:var(--radius);font-size:0.875rem;font-weight:500;color:var(--navy);background:none;border:none;cursor:pointer}
.btn-primary{padding:0.5rem 1.25rem;border-radius:var(--radius);font-size:0.875rem;font-weight:600;background:var(--sky);color:#fff;border:none;cursor:pointer}
.hero{background:linear-gradient(160deg,#0f1c2e 0%,#1E3A5F 55%,#1a3557 100%);padding:5rem 2.5rem 4rem;text-align:center}
.eyebrow{font-size:0.78rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--sky);margin-bottom:0.75rem}
.hero h1{font-size:clamp(2rem,3.5vw,2.8rem);color:#fff;font-weight:700;margin-bottom:1rem;letter-spacing:-0.03em}
.hero-sub{color:rgba(255,255,255,0.7);font-size:1.05rem;max-width:560px;margin:0 auto;line-height:1.7}
.pairs-section{padding:5rem 2.5rem;background:var(--white)}
.section-inner{max-width:1180px;margin:0 auto}
.pair{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem}
.pair-problem{background:#f0f4f9;border:1px solid #c8d8ec;border-radius:var(--radius-lg);padding:1.75rem;border-left:4px solid var(--navy)}
.pair-solution{background:#eaf3fb;border:1px solid #9dc4e8;border-radius:var(--radius-lg);padding:1.75rem;border-left:4px solid var(--sky)}
.pair-tag{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.75rem}
.pair-problem .pair-tag{color:var(--navy)}
.pair-solution .pair-tag{color:var(--sky)}
.pair-icon{font-size:1.5rem;margin-bottom:0.5rem}
.pair-title{font-family:'Sora',sans-serif;font-size:0.95rem;font-weight:700;color:var(--navy);margin-bottom:0.4rem}
.pair-text{font-size:0.85rem;color:var(--text-2);line-height:1.65}
.arrow-row{display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;color:var(--sky);font-size:1.5rem}
.cta-section{background:linear-gradient(135deg,#0f1c2e 0%,#1E3A5F 100%);text-align:center;padding:6rem 2.5rem}
.cta-headline{font-family:'Sora',sans-serif;font-size:clamp(1.7rem,3vw,2.3rem);font-weight:700;color:#fff;margin-bottom:1rem;letter-spacing:-0.02em}
.cta-sub{color:rgba(255,255,255,0.6);font-size:1rem;margin-bottom:2.5rem}
.cta-actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.hero-btn-primary{padding:0.75rem 1.75rem;border-radius:var(--radius);font-size:0.95rem;font-weight:600;background:var(--sky);color:#fff;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.hero-btn-secondary{padding:0.75rem 1.75rem;border-radius:var(--radius);font-size:0.95rem;font-weight:600;background:none;color:#fff;border:1.5px solid rgba(255,255,255,0.35);cursor:pointer;font-family:'DM Sans',sans-serif}
/* ===== FOOTER ===== */
  footer { background: #0f1c2e; padding: 4rem 2.5rem 2rem; border-top: 1px solid rgba(255,255,255,0.06); }
  .footer-inner { max-width: 1180px; margin: 0 auto; }
  .footer-top { display: grid; grid-template-columns: 1.5fr repeat(4, 1fr); gap: 3rem; margin-bottom: 3rem; }
  .footer-brand .logo { margin-bottom: 0.75rem; }
  .footer-tagline { color: rgba(255,255,255,0.45); font-size: 0.85rem; line-height: 1.6; max-width: 200px; }
  .footer-col-title { display: block; color: rgba(255,255,255,0.85); font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; text-decoration: none; transition: color 0.15s; cursor: pointer; }
  .footer-col-title:hover { color: var(--sky); }
  .footer-links { display: flex; flex-direction: column; gap: 0.5rem; }
  .footer-link { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
  .footer-bottom { border-top: 1px solid rgba(255,255,255,0.06); padding-top: 1.5rem; color: rgba(255,255,255,0.25); font-size: 0.78rem; }
  @media(max-width:900px) { .footer-top { grid-template-columns: 1fr 1fr; } }
  @media(max-width:600px) { .footer-top { grid-template-columns: 1fr; } }
@media(max-width:700px){.pair{grid-template-columns:1fr}.nav-links{display:none}}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(10,20,40,0.6);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:22px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,0.2);position:relative;animation:modal-in 0.2s ease}
@keyframes modal-in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;cursor:pointer;color:#8896A5;font-size:1.4rem;line-height:1;padding:0.25rem 0.5rem;border-radius:6px}
.modal-logo{display:flex;align-items:center;font-family:'Sora',sans-serif;font-weight:700;font-size:1.2rem;margin-bottom:1.5rem}
.modal-title{font-family:'Sora',sans-serif;font-size:1.3rem;font-weight:700;color:#1E3A5F;margin-bottom:0.4rem}
.modal-subtitle{color:#4A5568;font-size:0.875rem;margin-bottom:1.5rem;line-height:1.6}
.modal-input{width:100%;padding:0.75rem 1rem;border-radius:8px;border:1.5px solid #CBD5E1;font-size:0.9rem;font-family:'DM Sans',sans-serif;color:#0F1C2E;outline:none;transition:border-color 0.15s;margin-bottom:0.75rem}
.modal-input:focus{border-color:#4A90D9}
.modal-submit{width:100%;padding:0.75rem;border-radius:8px;background:#4A90D9;color:#fff;border:none;cursor:pointer;font-size:0.9rem;font-weight:600;font-family:'DM Sans',sans-serif;transition:background 0.15s}
.modal-submit:hover{background:#3a7bbf}
.modal-submit:disabled{background:#CBD5E1;cursor:not-allowed}
.modal-success{display:none;background:#EDF5DC;border:1px solid #b8d98a;border-radius:8px;padding:1rem;margin-bottom:1rem;color:#3a5c0f;font-size:0.875rem;line-height:1.6}
.modal-success.show{display:block}
.modal-success strong{display:block;margin-bottom:0.25rem}
.modal-error{display:none;background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:0.75rem 1rem;margin-bottom:0.75rem;color:#DC2626;font-size:0.85rem}
.modal-error.show{display:block}
.modal-footer{margin-top:1.25rem;text-align:center;color:#8896A5;font-size:0.8rem}
.modal-footer a{color:#4A90D9;text-decoration:underline}
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>
<section class="hero"><div style="max-width:760px;margin:0 auto" id="hero"></div></section>
<section class="pairs-section"><div class="section-inner" id="pairs"></div></section>
<section class="cta-section" id="cta"></section>
<footer id="footer"></footer>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const C=CONFIG;
  document.getElementById('nav').innerHTML=`<div class="nav-inner"><a href="${C.landing_url}" class="logo"><span class="logo-good">${C.nav.logo_good}</span><span class="logo-wease">${C.nav.logo_wease}</span></a><nav class="nav-links">${C.nav.links.map((l,i)=>`<a class="nav-link${i===0?' active':''}" href="${l.href}">${l.label}</a>`).join('')}</nav><div class="nav-actions"><button class="btn-ghost open-login-modal">Connexion</button><a href="rdv.html" class="btn-primary" style="text-decoration:none;display:inline-flex;align-items:center">${C.nav.cta_demo}</a></div></div>`;
  document.getElementById('hero').innerHTML=`<div class="eyebrow">${C.hero.eyebrow}</div><h1>${C.hero.headline}</h1><p class="hero-sub" style="margin-top:1rem">${C.hero.subtext}</p>`;
  document.getElementById('pairs').innerHTML=C.pairs.map(p=>`
    <div class="pair">
      <div class="pair-problem">
        <div class="pair-tag">◆ Le problème</div>
        <div class="pair-icon">${p.problem_icon}</div>
        <div class="pair-title">${p.problem_title}</div>
        <div class="pair-text">${p.problem_text}</div>
      </div>
      <div class="pair-solution">
        <div class="pair-tag">✓ La solution Goodwease</div>
        <div class="pair-icon">${p.solution_icon}</div>
        <div class="pair-title">${p.solution_title}</div>
        <div class="pair-text">${p.solution_text}</div>
      </div>
    </div>`).join('');
  document.getElementById('cta').innerHTML=`<div class="cta-headline">${C.cta.headline}</div><div class="cta-sub">${C.cta.subtext}</div><div class="cta-actions"><a href="rdv.html" class="hero-btn-primary" style="text-decoration:none">${C.cta.cta_primary}</a>${C.cta.cta_secondary ? `<button class="hero-btn-secondary">${C.cta.cta_secondary}</button>` : ""}</div>`;
/* FOOTER */
  const fo = C.footer;
  document.getElementById('footer').innerHTML = `
    <div class="footer-inner">
      <div class="footer-top">
        <div class="footer-brand">
          <div class="logo"><span class="logo-good">${C.nav.logo_good}</span><span class="logo-wease">${C.nav.logo_wease}</span></div>
          <div class="footer-tagline">${fo.tagline}</div>
        </div>
        ${fo.cols.map(c => `
        <div>
          <a class="footer-col-title" href="${c.href}">${c.title}</a>
          <div class="footer-links">${c.links.map(l => typeof l === 'string' ? `<span class="footer-link">${l}</span>` : `<a class="footer-link" href="${l.href}">${l.label}</a>`).join('')}</div>
        </div>`).join('')}
      </div>
      <div class="footer-bottom">${fo.legal}</div>
    </div>`;
});
</script>
<div class="modal-overlay" id="login-modal">
  <div class="modal-box">
    <button class="modal-close" id="modal-close-btn">✕</button>
    <div class="modal-logo"><span style="color:#1E3A5F">good</span><span style="color:#4A90D9">wease</span></div>
    <div class="modal-title">Connexion</div>
    <div class="modal-subtitle">Entrez votre email pour recevoir un lien de connexion.</div>
    <div class="modal-success" id="modal-success"></div>
    <div class="modal-error" id="modal-error"></div>
    <input class="modal-input" id="modal-email" type="email" autocomplete="email" placeholder="votre@email.com" />
    <button class="modal-submit" id="modal-submit">Recevoir un lien de connexion</button>
    <div class="modal-footer">Pas encore client ? <a href="rdv.html">Nous contacter</a></div>
  </div>
</div>
<script>
document.addEventListener('DOMContentLoaded',function(){
  var modal=document.getElementById('login-modal');
  var inp=document.getElementById('modal-email');
  var btn=document.getElementById('modal-submit');
  var ok=document.getElementById('modal-success');
  var err=document.getElementById('modal-error');
  function openModal(){modal.classList.add('open');setTimeout(function(){inp.focus();},100);}
  function closeModal(){modal.classList.remove('open');inp.value='';ok.classList.remove('show');err.classList.remove('show');btn.disabled=false;btn.style.display='';inp.style.display='';btn.textContent='Recevoir un lien de connexion';}
  document.getElementById('modal-close-btn').addEventListener('click',closeModal);
  modal.addEventListener('click',function(e){if(e.target===modal)closeModal();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
  btn.addEventListener('click',function(){
    var email=inp.value.trim();
    if(!email||!email.includes('@')){err.textContent='Veuillez saisir une adresse email valide.';err.classList.add('show');return;}
    err.classList.remove('show');btn.disabled=true;btn.textContent='Envoi en cours...';
    fetch('https://goodwease-dev.vercel.app/api/auth/magic-link',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email})})
      .then(function(r){if(r.ok){ok.innerHTML='<strong>Lien envoyé ✓</strong>Vérifiez votre boîte mail. Le lien est valable 15 minutes.';ok.classList.add('show');btn.style.display='none';inp.style.display='none';}else throw 0;})
      .catch(function(){err.textContent='Une erreur est survenue. Veuillez réessayer.';err.classList.add('show');btn.disabled=false;btn.textContent='Recevoir un lien de connexion';});
  });
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')btn.click();});
  document.querySelectorAll('.open-login-modal').forEach(function(el){el.addEventListener('click',openModal);});
});
</script>
</body>
</html>
