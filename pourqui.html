<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1E3A5F;--sky:#4A90D9;--sky-10:#eaf3fb;--surface:#F7F8FC;--white:#FFFFFF;--border:#CBD5E1;--border-light:#E2E8F0;--text-1:#0F1C2E;--text-2:#4A5568;--text-3:#8896A5;--amber:#BA7517;--green:#639922;--radius:8px;--radius-lg:14px;font-size:16px}
body{font-family:'DM Sans',sans-serif;color:var(--text-1);background:var(--white);line-height:1.65;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Sora',sans-serif;line-height:1.2}
a{color:inherit;text-decoration:none}
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border-light);padding:0 2.5rem}
.nav-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:2rem;height:62px}
.logo{display:flex;align-items:center;font-family:'Sora',sans-serif;font-weight:700;font-size:1.35rem;margin-right:1rem}
.logo-good{color:var(--navy)}.logo-wease{color:var(--sky)}
.nav-links{display:flex;gap:0.25rem;flex:1}
.nav-link{padding:0.4rem 0.85rem;border-radius:6px;font-size:0.88rem;font-weight:500;color:var(--text-2);cursor:pointer;transition:background 0.15s}
.nav-link:hover,.nav-link.active{background:var(--sky-10);color:var(--navy)}
.nav-actions{display:flex;align-items:center;gap:0.75rem}
.btn-ghost{padding:0.4rem 1rem;border-radius:var(--radius);font-size:0.875rem;font-weight:500;color:var(--navy);background:none;border:none;cursor:pointer}
.btn-primary{padding:0.5rem 1.25rem;border-radius:var(--radius);font-size:0.875rem;font-weight:600;background:var(--sky);color:#fff;border:none;cursor:pointer}

/* HERO */
.hero{background:linear-gradient(160deg,#0f1c2e 0%,#1E3A5F 55%,#1a3557 100%);padding:5rem 2.5rem 4rem;text-align:center}
.eyebrow{font-size:0.78rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--sky);margin-bottom:0.75rem}
.hero h1{font-size:clamp(2rem,3.5vw,2.8rem);color:#fff;font-weight:700;margin-bottom:1rem;letter-spacing:-0.03em}
.hero-sub{color:rgba(255,255,255,0.7);font-size:1.05rem;max-width:580px;margin:0 auto;line-height:1.7}

/* PARTIE 1 — PAR FONCTION */
.roles-section{padding:5rem 2.5rem;background:var(--surface)}
.section-inner{max-width:1180px;margin:0 auto}
.section-eyebrow{font-size:0.78rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--sky);margin-bottom:0.5rem}
.section-headline{font-family:'Sora',sans-serif;font-size:clamp(1.5rem,2.5vw,2rem);font-weight:700;color:var(--navy);margin-bottom:0.5rem;letter-spacing:-0.02em}
.section-sub{color:var(--text-2);font-size:0.95rem;max-width:580px;line-height:1.7;margin-bottom:3rem}
.role-card{background:var(--white);border:1px solid var(--border-light);border-radius:20px;padding:2.5rem;margin-bottom:2rem;display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start;transition:box-shadow 0.2s}
.role-card:hover{box-shadow:0 8px 32px rgba(30,58,95,0.08)}
.role-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem}
.role-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
.role-title{font-family:'Sora',sans-serif;font-size:1.1rem;font-weight:700;color:var(--navy)}
.role-subtitle{font-size:0.82rem;color:var(--text-3);margin-top:0.15rem}
.role-problem{background:var(--surface);border-radius:var(--radius-lg);padding:1rem 1.25rem;font-size:0.875rem;color:var(--text-2);line-height:1.65;margin-bottom:1.25rem;border-left:3px solid var(--border)}
.role-benefits{display:flex;flex-direction:column;gap:0.5rem}
.role-benefit{display:flex;align-items:flex-start;gap:0.6rem;font-size:0.875rem;color:var(--text-2)}
.role-benefit::before{content:'✓';color:var(--sky);font-weight:700;flex-shrink:0;margin-top:0.1rem}
.role-quote{background:var(--surface);border-radius:var(--radius-lg);padding:1.5rem;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.role-quote-text{font-size:0.9rem;color:var(--text-2);line-height:1.7;font-style:italic;margin-bottom:1rem}
.role-quote-text::before{content:'\201C';font-family:'Sora',sans-serif;font-size:2rem;color:var(--sky);display:block;line-height:1;margin-bottom:0.25rem;font-style:normal}
.role-quote-author{font-weight:600;font-size:0.82rem;color:var(--navy)}
.role-quote-role{font-size:0.78rem;color:var(--text-3);margin-top:0.15rem}

/* SÉPARATEUR */
.divider-section{background:var(--navy);padding:4rem 2.5rem;text-align:center}
.divider-headline{font-family:'Sora',sans-serif;font-size:clamp(1.3rem,2vw,1.7rem);font-weight:700;color:#fff;margin-bottom:0.5rem}
.divider-sub{color:rgba(255,255,255,0.6);font-size:0.95rem}

/* PARTIE 2 — PAR TAILLE */
.segments-section{padding:5rem 2.5rem;background:var(--white)}
.segments-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
.seg-card{background:var(--surface);border:1px solid var(--border-light);border-radius:20px;padding:2rem;display:flex;flex-direction:column;gap:1.25rem;transition:box-shadow 0.2s}
.seg-card:hover{box-shadow:0 8px 32px rgba(30,58,95,0.08)}
.seg-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
.seg-icon{font-size:2rem}
.seg-tag{font-size:0.7rem;font-weight:700;padding:0.25rem 0.65rem;border-radius:999px;white-space:nowrap}
.seg-title{font-family:'Sora',sans-serif;font-size:1.05rem;font-weight:700;color:var(--navy);margin-top:0.5rem}
.seg-context{font-size:0.85rem;color:var(--text-2);line-height:1.65;padding:0.75rem 1rem;background:var(--white);border-radius:var(--radius);border-left:3px solid var(--border)}
.seg-label{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-3);margin-bottom:0.5rem}
.seg-list{display:flex;flex-direction:column;gap:0.4rem}
.seg-item{font-size:0.83rem;color:var(--text-2);display:flex;align-items:flex-start;gap:0.5rem;line-height:1.5}
.seg-item.enjeu::before{content:'·';color:var(--text-3);flex-shrink:0;font-weight:700;font-size:1.1rem;line-height:1.3}
.seg-item.good::before{content:'✓';color:var(--sky);flex-shrink:0;font-weight:700;font-size:0.85rem;line-height:1.5}
.seg-cta{margin-top:auto;padding:0.65rem 1rem;border-radius:var(--radius);font-size:0.85rem;font-weight:600;background:none;border:1.5px solid var(--border);color:var(--navy);cursor:pointer;font-family:'DM Sans',sans-serif;transition:border-color 0.15s,background 0.15s;text-align:center}
.seg-cta:hover{border-color:var(--sky);background:var(--sky-10)}

/* TECH NOTE DSI */
.tech-note{margin-top:1.5rem;background:#f0f4f9;border:1px solid #c8d8ec;border-radius:var(--radius-lg);padding:1.25rem;border-left:4px solid var(--navy)}
.tech-note-title{font-size:0.78rem;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.75rem}
.tech-note-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.4rem}
.tech-note-item{font-size:0.78rem;color:var(--text-2);display:flex;align-items:flex-start;gap:0.4rem;line-height:1.5}
.tech-note-item::before{content:'›';color:var(--sky);font-weight:700;flex-shrink:0}
.role-card-dsi{grid-template-columns:1.2fr 0.8fr}

/* CTA FINAL */
.cta-section{background:linear-gradient(135deg,#0f1c2e 0%,#1E3A5F 100%);text-align:center;padding:6rem 2.5rem}
.cta-headline{font-family:'Sora',sans-serif;font-size:clamp(1.7rem,3vw,2.3rem);font-weight:700;color:#fff;margin-bottom:1rem;letter-spacing:-0.02em}
.cta-sub{color:rgba(255,255,255,0.6);font-size:1rem;margin-bottom:2.5rem}
.cta-actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.hero-btn-primary{padding:0.75rem 1.75rem;border-radius:var(--radius);font-size:0.95rem;font-weight:600;background:var(--sky);color:#fff;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.15s}
.hero-btn-primary:hover{background:#3a7bbf}
.hero-btn-secondary{padding:0.75rem 1.75rem;border-radius:var(--radius);font-size:0.95rem;font-weight:600;background:none;color:#fff;border:1.5px solid rgba(255,255,255,0.35);cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.15s}
.hero-btn-secondary:hover{background:rgba(255,255,255,0.08)}
footer{background:#0f1c2e;padding:2rem 2.5rem;border-top:1px solid rgba(255,255,255,0.06);text-align:center;color:rgba(255,255,255,0.3);font-size:0.78rem}

@media(max-width:900px){.role-card{grid-template-columns:1fr}.segments-grid{grid-template-columns:1fr}.nav-links{display:none}}
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>
<section class="hero"><div style="max-width:760px;margin:0 auto" id="hero"></div></section>

<!-- PARTIE 1 : PAR FONCTION -->
<section class="roles-section"><div class="section-inner" id="roles"></div></section>

<!-- SÉPARATEUR -->
<div class="divider-section" id="divider"></div>

<!-- PARTIE 2 : PAR TAILLE -->
<section class="segments-section"><div class="section-inner" id="segments"></div></section>

<section class="cta-section" id="cta"></section>
<footer id="footer"></footer>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const C = CONFIG;

  // NAV
  document.getElementById('nav').innerHTML = `<div class="nav-inner"><a href="${C.landing_url}" class="logo"><span class="logo-good">${C.nav.logo_good}</span><span class="logo-wease">${C.nav.logo_wease}</span></a><nav class="nav-links">${C.nav.links.map((l,i) => `<a class="nav-link${i===1?' active':''}">${l}</a>`).join('')}</nav><div class="nav-actions"><button class="btn-ghost">${C.nav.cta_login}</button><button class="btn-primary">${C.nav.cta_demo}</button></div></div>`;

  // HERO
  document.getElementById('hero').innerHTML = `<div class="eyebrow">${C.hero.eyebrow}</div><h1>${C.hero.headline}</h1><p class="hero-sub" style="margin-top:1rem">${C.hero.subtext}</p>`;

  // PARTIE 1 — PAR FONCTION
  document.getElementById('roles').innerHTML = `
    <div class="section-eyebrow">Par fonction</div>
    <div class="section-headline">Chaque rôle a ses propres enjeux</div>
    <div class="section-sub">Goodwease répond aux besoins spécifiques de chaque interlocuteur — du terrain à la direction.</div>
    ${C.roles.map(r => `
    <div class="role-card${r.tech_note ? ' role-card-dsi' : ''}">
      <div>
        <div class="role-header">
          <div class="role-icon" style="background:${r.bg}">${r.icon}</div>
          <div><div class="role-title">${r.title}</div><div class="role-subtitle">${r.subtitle}</div></div>
        </div>
        <div class="role-problem">${r.problem}</div>
        <div class="role-benefits">${r.benefits.map(b => `<div class="role-benefit">${b}</div>`).join('')}</div>
        ${r.tech_note ? `<div class="tech-note"><div class="tech-note-title">🔧 ${r.tech_note.title}</div><div class="tech-note-grid">${r.tech_note.items.map(i => `<div class="tech-note-item">${i}</div>`).join('')}</div></div>` : ''}
      </div>
      <div class="role-quote">
        <div class="role-quote-text">${r.quote}</div>
        <div>
          <div class="role-quote-author">${r.quote_role.split(',')[0]}</div>
          <div class="role-quote-role">${r.quote_role.split(',').slice(1).join(',').trim()}</div>
        </div>
      </div>
    </div>`).join('')}`;

  // SÉPARATEUR
  const si = C.segments_intro;
  document.getElementById('divider').innerHTML = `<div class="divider-headline">${si.headline}</div><div class="divider-sub">${si.subtext}</div>`;

  // PARTIE 2 — PAR TAILLE
  document.getElementById('segments').innerHTML = `
    <div class="section-eyebrow">${C.segments_intro.eyebrow}</div>
    <div class="section-headline" style="margin-bottom:2.5rem">Starter, Enterprise ou Fournisseur — choisissez votre contexte</div>
    <div class="segments-grid">${C.segments.map(s => `
    <div class="seg-card">
      <div>
        <div class="seg-top"><div class="seg-icon">${s.icon}</div><span class="seg-tag" style="background:${s.tag_color}18;color:${s.tag_color}">${s.tag}</span></div>
        <div class="seg-title">${s.title}</div>
      </div>
      <div class="seg-context">${s.context}</div>
      <div><div class="seg-label">Vos enjeux</div><div class="seg-list">${s.enjeux.map(e => `<div class="seg-item enjeu">${e}</div>`).join('')}</div></div>
      <div><div class="seg-label">Ce que Goodwease apporte</div><div class="seg-list">${s.goodwease.map(g => `<div class="seg-item good">${g}</div>`).join('')}</div></div>
      <button class="seg-cta">${s.cta}</button>
    </div>`).join('')}</div>`;
