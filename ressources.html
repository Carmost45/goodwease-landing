<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ — Goodwease</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script>
const CONFIG = {
  landing_url: "https://goodwease-landing.vercel.app",
  nav: { logo_good:"good", logo_wease:"wease", links:[
      { label: "Fonctionnalités", href: "fonctionnalites.html" },
      { label: "Pour qui ?",      href: "pourqui.html" },
      { label: "Tarifs",          href: "tarifs.html" },
      { label: "Ressources",      href: "ressources.html" },
    ], cta_login:"Connexion", cta_demo:"Prendre rendez-vous" },
  hero: {
    eyebrow: "Ressources & FAQ",
    headline: "Toutes les réponses à vos questions",
    subtext: "5 thèmes couverts : méthode, technique, RGPD, tarifs et déploiement.",
  },
  themes: [
    {
      icon: "🎯", title: "Méthode",
      items: [
        { q:"Qu'est-ce qu'une évaluation 360° B2B ?", a:"C'est une évaluation symétrique où le client évalue le fournisseur ET le fournisseur évalue le client, avec le même questionnaire. Toutes les personnes en contact des deux côtés participent — pas seulement les dirigeants. Le résultat est une vue partagée et objective de la qualité de la relation." },
        { q:"Qu'est-ce que le cercle vertueux d'amélioration continue ?", a:"Chaque campagne d'évaluation produit un plan d'action co-construit. La campagne suivante mesure les progrès réalisés sur ces actions. Ce cycle continu — mesurer, agir, remesurer — crée un cercle vertueux qui renforce durablement la relation." },
        { q:"À quelle fréquence faut-il évaluer ?", a:"La fréquence par défaut est semestrielle, ce qui permet de mesurer des progrès réels sans surcharger les équipes. Elle est configurable relation par relation selon sa criticité." },
        { q:"Combien de personnes doivent participer pour que la synthèse soit affichée ?", a:"Au minimum 3 répondants par côté. En dessous de ce seuil, la synthèse n'est pas affichée pour protéger l'anonymat des répondants." },
      ],
    },
    {
      icon: "🔒", title: "Technique & Sécurité",
      items: [
        { q:"Comment l'anonymat des répondants est-il garanti ?", a:"Techniquement, et non seulement organisationnellement. La dissociation identité/réponse est faite à l'enregistrement — il est impossible de relier une réponse à son auteur même avec un accès direct à la base de données. On utilise un HMAC-SHA256 avec un sel unique par campagne." },
        { q:"Qui peut voir les réponses individuelles ?", a:"Personne. Ni les admins, ni l'équipe Goodwease. Seules les synthèses agrégées et anonymisées sont accessibles. C'est une garantie technique, pas organisationnelle." },
        { q:"Goodwease fonctionne-t-il sur mobile ?", a:"Oui. Le questionnaire évaluateur est optimisé pour tous les appareils (mobile, tablette, desktop). La sauvegarde intermédiaire est automatique." },
        { q:"Quelles sont les intégrations disponibles ?", a:"Au MVP, Goodwease fonctionne de façon autonome. Les intégrations ERP, SRM et Achats sont prévues à R2+. Des exports CSV et PDF sont disponibles dès le MVP." },
      ],
    },
    {
      icon: "⚖️", title: "RGPD & Hébergement",
      items: [
        { q:"Où sont hébergées les données ?", a:"Exclusivement en France (Supabase région Paris, eu-west-3). Les données ne quittent jamais le territoire européen. La migration vers Scaleway Paris est prévue à R1 pour une souveraineté totale." },
        { q:"Comment un utilisateur exerce-t-il ses droits RGPD ?", a:"Les droits d'accès (Art.15), de rectification (Art.16), d'effacement (Art.17) et d'opposition sont disponibles en libre-service depuis le profil utilisateur — sans demande manuelle à Goodwease." },
        { q:"Goodwease est-il concerné par le Cloud Act américain ?", a:"Goodwease utilise Supabase qui a signé les Clauses Contractuelles Types (SCC) de l'UE. Le risque Cloud Act est théorique pour des données B2B non sensibles. La migration vers Scaleway (infra française) est prévue avant les premiers grands comptes." },
        { q:"Quel est le registre des traitements ?", a:"Goodwease maintient un registre des traitements conforme RGPD. Les bases légales sont : exécution du contrat (gestion des comptes), intérêt légitime (envoi d'invitations), consentement (participation aux évaluations), obligation légale (logs d'audit)." },
      ],
    },
    {
      icon: "💶", title: "Tarifs & Contrats",
      items: [
        { q:"Quel est le modèle de tarification ?", a:"Goodwease facture par fournisseur actif par mois. Un fournisseur actif est toute entreprise avec une relation en statut actif. 4 packs : Starter 100 fournisseurs à 1 000€/mois, Business 250 à 2 250€/mois, Scale 500 à 4 000€/mois, Enterprise 1 000 à 7 000€/mois." },
        { q:"Y a-t-il une période d'essai ?", a:"Oui. Goodwease propose un POC à 7 500€ one-shot, plafonné à 5 fournisseurs, sur 3 mois. Ce montant est imputable sur la première année d'abonnement." },
        { q:"Les relations internes (entre départements) consomment-elles du quota ?", a:"Non. Les évaluations internes (entre départements d'une même entreprise) ne consomment pas de quota fournisseurs." },
        { q:"Peut-on cumuler plusieurs packs ?", a:"Oui. Les packs sont cumulatifs — vous pouvez combiner plusieurs packs pour atteindre le quota souhaité avec une tarification dégressive." },
      ],
    },
    {
      icon: "🚀", title: "Déploiement",
      items: [
        { q:"Combien de temps faut-il pour déployer Goodwease ?", a:"48 heures pour la première campagne. Le Super Admin Goodwease crée votre Company, vous configurez vos directions et importez vos utilisateurs (CSV), et vous lancez votre première campagne." },
        { q:"Faut-il impliquer la DSI ?", a:"Pas au MVP. Goodwease est une application SaaS accessible depuis n'importe quel navigateur. La DSI n'intervient qu'à R1+ pour la configuration SSO (Active Directory, Azure AD, Okta)." },
        { q:"Comment former les utilisateurs ?", a:"Le questionnaire évaluateur est conçu pour être rempli sans formation — 5 à 10 minutes maximum. Les Admins reçoivent une documentation et peuvent bénéficier d'une session d'onboarding incluse." },
        { q:"Que se passe-t-il à la résiliation ?", a:"Vous pouvez exporter toutes vos données (JSON + CSV) à tout moment. À la résiliation, les données sont disponibles pendant 30 jours, puis les données personnelles sont supprimées. Les données agrégées anonymisées sont conservées indéfiniment (valeur stratégique)." },
      ],
    },
  ],
  cta: {
    headline: "Votre question n'est pas dans la liste ?",
    subtext: "Contactez-nous — on répond en moins de 24h.",
    cta_primary: "Prendre rendez-vous",
    cta_secondary: "Nous contacter",
  },
};
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1E3A5F;--sky:#4A90D9;--sky-10:#eaf3fb;--surface:#F7F8FC;--white:#FFFFFF;--border:#CBD5E1;--border-light:#E2E8F0;--text-1:#0F1C2E;--text-2:#4A5568;--text-3:#8896A5;--radius:8px;--radius-lg:14px;font-size:16px}
body{font-family:'DM Sans',sans-serif;color:var(--text-1);background:var(--white);line-height:1.65;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Sora',sans-serif;line-height:1.2}
a{color:inherit;text-decoration:none}
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border-light);padding:0 2.5rem}
.nav-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:2rem;height:62px}
.logo{display:flex;align-items:center;font-family:'Sora',sans-serif;font-weight:700;font-size:1.35rem;margin-right:1rem}
.logo-good{color:var(--navy)}.logo-wease{color:var(--sky)}
.nav-links{display:flex;gap:0.25rem;flex:1}
.nav-link{padding:0.4rem 0.85rem;border-radius:6px;font-size:0.88rem;font-weight:500;color:var(--text-2);cursor:pointer;transition:background 0.15s}
.nav-link:hover,.nav-link.active{background:var(--sky-10);color:var(--navy)}
.nav-actions{display:flex;align-items:center;gap:0.75rem}
.btn-ghost{padding:0.4rem 1rem;border-radius:var(--radius);font-size:0.875rem;font-weight:500;color:var(--navy);background:none;border:none;cursor:pointer}
.btn-primary{padding:0.5rem 1.25rem;border-radius:var(--radius);font-size:0.875rem;font-weight:600;background:var(--sky);color:#fff;border:none;cursor:pointer}
.hero{background:linear-gradient(160deg,#0f1c2e 0%,#1E3A5F 55%,#1a3557 100%);padding:5rem 2.5rem 4rem;text-align:center}
.eyebrow{font-size:0.78rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--sky);margin-bottom:0.75rem}
.hero h1{font-size:clamp(2rem,3.5vw,2.8rem);color:#fff;font-weight:700;margin-bottom:1rem;letter-spacing:-0.03em}
.hero-sub{color:rgba(255,255,255,0.7);font-size:1.05rem;max-width:560px;margin:0 auto;line-height:1.7}
.faq-section{padding:5rem 2.5rem;background:var(--surface)}
.faq-inner{max-width:860px;margin:0 auto}
.theme-block{margin-bottom:3rem}
.theme-header{display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:2px solid var(--border-light)}
.theme-icon{font-size:1.3rem}
.theme-title{font-family:'Sora',sans-serif;font-size:1.1rem;font-weight:700;color:var(--navy)}
.faq-item{background:var(--white);border:1px solid var(--border-light);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:0.75rem}
.faq-q{width:100%;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.4rem;cursor:pointer;background:none;border:none;text-align:left;font-family:'DM Sans',sans-serif;font-size:0.93rem;font-weight:600;color:var(--navy)}
.faq-arrow{color:var(--sky);font-size:1.2rem;transition:transform 0.2s;flex-shrink:0;margin-left:1rem}
.faq-item.open .faq-arrow{transform:rotate(180deg)}
.faq-a{display:none;padding:0 1.4rem 1.1rem;color:var(--text-2);font-size:0.875rem;line-height:1.75;border-top:1px solid var(--border-light);padding-top:0.75rem}
.faq-item.open .faq-a{display:block}
.cta-section{background:linear-gradient(135deg,#0f1c2e 0%,#1E3A5F 100%);text-align:center;padding:6rem 2.5rem}
.cta-headline{font-family:'Sora',sans-serif;font-size:clamp(1.7rem,3vw,2.3rem);font-weight:700;color:#fff;margin-bottom:1rem;letter-spacing:-0.02em}
.cta-sub{color:rgba(255,255,255,0.6);font-size:1rem;margin-bottom:2.5rem}
.cta-actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.hero-btn-primary{padding:0.75rem 1.75rem;border-radius:var(--radius);font-size:0.95rem;font-weight:600;background:var(--sky);color:#fff;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.hero-btn-secondary{padding:0.75rem 1.75rem;border-radius:var(--radius);font-size:0.95rem;font-weight:600;background:none;color:#fff;border:1.5px solid rgba(255,255,255,0.35);cursor:pointer;font-family:'DM Sans',sans-serif}
footer{background:#0f1c2e;padding:2rem 2.5rem;border-top:1px solid rgba(255,255,255,0.06);text-align:center;color:rgba(255,255,255,0.3);font-size:0.78rem}
@media(max-width:600px){.nav-links{display:none}}
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>
<section class="hero"><div style="max-width:760px;margin:0 auto" id="hero"></div></section>
<section class="faq-section"><div class="faq-inner" id="faq"></div></section>
<section class="cta-section" id="cta"></section>
<footer id="footer"></footer>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const C=CONFIG;
  document.getElementById('nav').innerHTML=`<div class="nav-inner"><a href="${C.landing_url}" class="logo"><span class="logo-good">${C.nav.logo_good}</span><span class="logo-wease">${C.nav.logo_wease}</span></a><nav class="nav-links">${C.nav.links.map((l,i)=>`<a class="nav-link${i===3?' active':''}" href="${l.href}">${l.label}</a>`).join('')}</nav><div class="nav-actions"><a href="rdv.html" class="btn-primary" style="text-decoration:none;display:inline-flex;align-items:center">${C.nav.cta_demo}</a></div></div>`;
  document.getElementById('hero').innerHTML=`<div class="eyebrow">${C.hero.eyebrow}</div><h1>${C.hero.headline}</h1><p class="hero-sub" style="margin-top:1rem">${C.hero.subtext}</p>`;
  document.getElementById('faq').innerHTML=C.themes.map(t=>`
    <div class="theme-block">
      <div class="theme-header"><span class="theme-icon">${t.icon}</span><span class="theme-title">${t.title}</span></div>
      ${t.items.map(i=>`<div class="faq-item"><button class="faq-q">${i.q}<span class="faq-arrow">▾</span></button><div class="faq-a">${i.a}</div></div>`).join('')}
    </div>`).join('');
  document.getElementById('cta').innerHTML=`<div class="cta-headline">${C.cta.headline}</div><div class="cta-sub">${C.cta.subtext}</div><div class="cta-actions"><a href="rdv.html" class="hero-btn-primary" style="text-decoration:none">${C.cta.cta_primary}</a><button class="hero-btn-secondary">${C.cta.cta_secondary}</button></div>`;
  document.getElementById('footer').textContent=`© 2026 Goodwease — Tous droits réservés — Hébergé en France 🇫🇷`;
  document.querySelectorAll('.faq-q').forEach(btn=>{btn.addEventListener('click',()=>{const item=btn.closest('.faq-item');const isOpen=item.classList.contains('open');document.querySelectorAll('.faq-item').forEach(el=>el.classList.remove('open'));if(!isOpen)item.classList.add('open');});});
});
</script>
</body>
</html>
